<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Website</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #0078D4;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 10px 0;
            border-radius: 5px;
            box-shadow: 0px 0px 5px #ccc;
        }

        button {
            background: #0078D4;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #005a9e;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>

<header>
    <h1>Welcome to My Website</h1>
    <p>Simple, clean, and functional</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<div class="container">

    <div class="card">
        <h2>Home</h2>
        <p>This is a simple website created using HTML, CSS, and JavaScript.</p>
        <button onclick="showMessage()">Click Me</button>
    </div>

    <div class="card">
        <h2>About</h2>
        <p>This website is a basic template you can modify for your projects.</p>
    </div>

    <div class="card">
        <h2>Contact</h2>
        <p>Email: example@email.com</p>
    </div>

</div>

<footer>
    <p>© 2026 My Website</p>
</footer>

<script>
    function showMessage() {
        alert("Hello! You clicked the button.");
    }
</script>

</body>
</html>
